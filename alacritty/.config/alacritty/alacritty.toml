[env]
LANG = "zh_CN.UTF-8"


[window]
opacity = 0.85
title = ""
# decorations = "None"
dynamic_padding = true
padding = { x = 10, y = 10}
startup_mode = "SimpleFullscreen"

dimensions = { columns = 80, lines = 25}

# [terminal]
# osc52 = "CopyPaste"
#

[font]
size = 12.0

[font.bold]
family = "JetBrainsMono NerdFont"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono NerdFont"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono NerdFont"
style = "Italic"

[font.normal]
family = "JetBrainsMono NerdFont"
style = "Regular"
